<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" id="theme-color" />
    <meta name="darkreader-lock" />
    <!-- VitePWA injects the manifest link automatically. If you need a
         static fallback, use: <link rel="manifest" href="/manifest.webmanifest" /> -->
    <script>
      // Set theme + loading background before first paint. Prevents flash.
      // Devs: change the colors below to match your app's brand.
      var d = matchMedia('(prefers-color-scheme: dark)').matches;
      if (d) document.documentElement.dataset.theme = 'dark';
      document.documentElement.style.background = d ? '#1b1b1b' : '#ececec';
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>webshare — FreeAppStore</title>
    <!-- Platform analytics loader. CF Web Analytics is auto-provisioned at publish;
         GA4 / Plausible / custom <head> are opt-in via PUT /v1/apps/webshare/analytics. -->
    <script src="https://api.freeappstore.online/v1/analytics.js?app=webshare" defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
